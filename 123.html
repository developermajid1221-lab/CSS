<style>
body {
    font-family: Arial, sans-serif;
    background: url('project/background.jpg') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
}

/* Container */
.container {
    max-width: 900px;
    margin: 30px auto;
    background: rgba(255, 255, 255, 0.9);
    padding: 25px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Headings */
h1, h2, h3 {
    text-align: center;
    color: #0b3d91;
}

/* Form layout */
.form-group {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group div {
    flex: 1;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Profile image */
.right-img {
    float: right;
    margin-top: -80px;
}

/* Button */
.submit-btn {
    background-color: #0b3d91;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.submit-btn:hover {
    background-color: #092d6b;
}

.center {
    text-align: center;
}

/* Mobile Responsive */
@media (max-width: 600px) {
    .form-group {
        flex-direction: column;
    }
}
</style>
</head>
